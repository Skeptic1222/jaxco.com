<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Not here right now — Jaxco</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&display=swap" rel="stylesheet">
  <style>
    :root { --bone:#F5F1E8; --warm-gray:#5C5751; --warm-gray-soft:rgba(92,87,81,.65); }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Newsreader',Georgia,serif; background:var(--bone); color:var(--warm-gray); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem 1.5rem; -webkit-font-smoothing:antialiased; }
    .card { text-align:center; max-width:480px; }
    .code { font-style:italic; font-size:clamp(4rem,14vw,6.5rem); line-height:1; color:var(--warm-gray); margin-bottom:1rem; }
    h1 { font-weight:400; font-size:clamp(1.3rem,4vw,1.7rem); margin-bottom:1rem; }
    p { color:var(--warm-gray-soft); font-style:italic; margin-bottom:1.5rem; }
    a { color:var(--warm-gray); text-decoration:none; border-bottom:1px solid var(--warm-gray-soft); padding-bottom:1px; }
    a:hover { border-bottom-color:var(--warm-gray); }
  </style>
</head>
<body>
  <article class="card">
    <p class="code">404</p>
    <h1>Not here right now.</h1>
    <p>Try the front door.</p>
    <p><a href="/">← Back to jaxco.com</a></p>
  </article>
</body>
</html>
